name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Check for upstream changes daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check-upstream:
    name: Check upstream for updates
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check upstream for new commits
        id: check
        run: |
          git remote add upstream https://github.com/nikosiaf/gaggiuino-barista.git || true
          git fetch upstream main
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          if git merge-base --is-ancestor "$UPSTREAM_SHA" HEAD; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "Upstream SHA: $UPSTREAM_SHA"
          echo "Has updates: $(git merge-base --is-ancestor "$UPSTREAM_SHA" HEAD && echo false || echo true)"

  test-upstream-compat:
    name: Test upstream compatibility
    runs-on: ubuntu-latest
    needs: [check-upstream]
    if: needs.check-upstream.outputs.has_updates == 'true'
    outputs:
      merge_ok: ${{ steps.merge.outputs.merge_ok }}
      conflict_files: ${{ steps.merge.outputs.conflict_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge upstream into branch
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/nikosiaf/gaggiuino-barista.git || true
          git fetch upstream main

          UPSTREAM_SHA="${{ needs.check-upstream.outputs.upstream_sha }}"
          BRANCH="upstream-sync/${UPSTREAM_SHA:0:8}"

          # Create sync branch from current main
          git checkout -b "$BRANCH"

          # Try to merge upstream
          if git merge upstream/main --no-edit -m "chore: sync with upstream (${UPSTREAM_SHA:0:8})"; then
            echo "merge_ok=true" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "Merge succeeded — testing build..."
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            echo "merge_ok=false" >> "$GITHUB_OUTPUT"
            echo "conflict_files=$CONFLICTS" >> "$GITHUB_OUTPUT"
            echo "Merge conflicts in: $CONFLICTS"
            git merge --abort
          fi

      - name: Lint merged Python
        if: steps.merge.outputs.merge_ok == 'true'
        run: |
          python3 -m py_compile src/server.py
          python3 -m py_compile src/plot_logic.py
          python3 -m py_compile src/annotation_engine.py

      - name: Set up Docker Buildx
        if: steps.merge.outputs.merge_ok == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Dockerfile.standalone
        if: steps.merge.outputs.merge_ok == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.standalone
          push: false
          tags: gaggiuino-barista:upstream-test

      - name: Build Dockerfile (HA add-on)
        if: steps.merge.outputs.merge_ok == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: gaggiuino-barista:upstream-test-ha
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.21

      - name: Verify fork customizations survived merge
        if: steps.merge.outputs.merge_ok == 'true'
        run: |
          echo "Checking fork-specific features..."
          grep -q 'SHOT_ID' src/plot_logic.py || { echo "FAIL: SHOT_ID support missing from plot_logic.py"; exit 1; }
          grep -q 'DISCORD_WEBHOOK' src/server.py || { echo "FAIL: Discord webhook support missing from server.py"; exit 1; }
          grep -q 'send_discord_notification' src/server.py || { echo "FAIL: send_discord_notification missing from server.py"; exit 1; }
          grep -q 'plot_last_n' src/server.py || { echo "FAIL: batch endpoint missing from server.py"; exit 1; }
          grep -q 'plot_shot' src/server.py || { echo "FAIL: single shot endpoint missing from server.py"; exit 1; }
          grep -q 'run_plot_for_shot' src/server.py || { echo "FAIL: run_plot_for_shot helper missing from server.py"; exit 1; }
          test -f Dockerfile.standalone || { echo "FAIL: Dockerfile.standalone missing"; exit 1; }
          test -f docker-compose.standalone.yml || { echo "FAIL: docker-compose.standalone.yml missing"; exit 1; }
          echo "All fork customizations verified."

      - name: Push branch and create PR
        if: steps.merge.outputs.merge_ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_SHA: ${{ needs.check-upstream.outputs.upstream_sha }}
        run: |
          BRANCH="${{ steps.merge.outputs.branch }}"
          git push origin "$BRANCH" --force

          # Close any existing upstream-sync PRs
          gh pr list --state open --json number,headRefName --jq '.[] | select(.headRefName | startswith("upstream-sync/")) | .number' | while read -r pr; do
            gh pr close "$pr" --comment "Superseded by new upstream sync." || true
          done

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Upstream sync (${UPSTREAM_SHA:0:8}) — builds OK" \
            --body "$(cat <<PREOF
          ## Summary
          - Synced with upstream [nikosiaf/gaggiuino-barista](https://github.com/nikosiaf/gaggiuino-barista) at \`${UPSTREAM_SHA}\`
          - Merge: clean (no conflicts)
          - Python lint: passed
          - Docker build (standalone): passed
          - Docker build (HA add-on): passed
          - Fork customizations verified (SHOT_ID, Discord, batch endpoints, standalone Docker)

          ## Review checklist
          - [ ] Review upstream changes for anything that needs fork-side adjustment
          - [ ] Merge when ready

          🤖 Generated by CI
          PREOF
          )"

  notify-failure:
    name: Notify upstream sync failure
    runs-on: ubuntu-latest
    needs: [check-upstream, test-upstream-compat]
    if: always() && needs.check-upstream.outputs.has_updates == 'true' && needs.test-upstream-compat.result == 'failure'
    steps:
      - name: Annotate workflow run with failure details
        env:
          UPSTREAM_SHA: ${{ needs.check-upstream.outputs.upstream_sha }}
          CONFLICT_FILES: ${{ needs.test-upstream-compat.outputs.conflict_files }}
          MERGE_OK: ${{ needs.test-upstream-compat.outputs.merge_ok }}
        run: |
          if [ "$MERGE_OK" = "false" ]; then
            echo "::error::Upstream sync failed — merge conflicts in: ${CONFLICT_FILES}. Manual resolution required. Upstream HEAD: ${UPSTREAM_SHA}"
          else
            echo "::error::Upstream sync failed — merge was clean but build or verification failed. Fork customizations may need updating. Upstream HEAD: ${UPSTREAM_SHA}"
          fi

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    strategy:
      matrix:
        dockerfile: [Dockerfile.standalone, Dockerfile]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.dockerfile }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: gaggiuino-barista:test
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.21

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: |
          python -m py_compile src/server.py
          python -m py_compile src/plot_logic.py
          python -m py_compile src/annotation_engine.py
