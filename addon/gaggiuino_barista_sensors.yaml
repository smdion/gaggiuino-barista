# ── PART 4: Dashboard Cards ───────────────────────────────────
# Add via: Dashboard → Edit → Add Card → Manual

# Card 1: Latest Shot
type: vertical-stack
cards:
  - type: markdown
    title: ☕ Latest Espresso Shot ☕
    content: >-
      {% set s    = state_attr('sensor.gaggiuino_barista_last_shot', 'datetime') %}
      {% set prof = state_attr('sensor.gaggiuino_barista_last_shot', 'profile') %}
      {% set dur  = state_attr('sensor.gaggiuino_barista_last_shot', 'duration_s') %}
      {% set w    = state_attr('sensor.gaggiuino_barista_last_shot', 'final_weight_g') %}
      {% set tw   = state_attr('sensor.gaggiuino_barista_last_shot', 'target_weight_g') %}
      {% set p    = state_attr('sensor.gaggiuino_barista_last_shot', 'max_pressure_bar') %}
      {% set t    = state_attr('sensor.gaggiuino_barista_last_shot', 'water_temp_c') %}
      {% set sc   = state_attr('sensor.gaggiuino_barista_last_shot', 'score') %}
      {% set ai   = state_attr('sensor.gaggiuino_barista_last_shot', 'ai_available') %}
      {% set v    = state_attr('sensor.gaggiuino_barista_last_shot', 'verdict') %}
      {% set tips = state_attr('sensor.gaggiuino_barista_last_shot', 'tuning') %}
      {% set ystr = w ~ 'g / ' ~ tw ~ 'g' if tw and tw != '-' and tw != 'None' else w ~ 'g' %}

      {% if prof and prof != 'None' %}
      **{{ s }}** &nbsp; ☕ {{ prof }}
      
      ⏱ {{ dur }}s &nbsp; ⚖️ {{ ystr }} &nbsp; 📈 {{ p }}bar &nbsp; 🌡 {{ t }}°C
      
      {% if sc %}<br>📊 **Score: {{ sc }}/100**{% endif %}

      ---
      {% if ai %}
      🧠 **AI Analysis**
      {{ v }}
      {% if tips %}
      🔧 **Next shot:**
      {% for tip in tips[:2] %}- {{ tip }}
      {% endfor %}{% endif %}
      {% else %}
      *AI analysis unavailable*
      {% endif %}
      {% else %}
      *No shots recorded yet — pull a shot!*
      {% endif %}
    card_mod:
      style: |
        ha-card { border-radius: 12px; margin-bottom: 8px; }
  - type: custom:config-template-card
    entities:
      - sensor.gaggiuino_barista_graph_1
    card:
      type: picture
      image: ${states['sensor.gaggiuino_barista_graph_1'].state}
      tap_action:
        action: url
        url_path: ${states['sensor.gaggiuino_barista_graph_1'].state}
    card_mod:
      style: |
        ha-card { border-radius: 12px; }


# Card 2: Shot History
type: vertical-stack
cards:
  - type: markdown
    title: 📋 Shot History
    card_mod:
      style: |
        ha-card { border-radius: 12px 12px 0 0; margin-bottom: -2px; text-align: center; }

# Shot 2
  - type: custom:config-template-card
    entities:
      - sensor.gaggiuino_barista_shot_history
      - sensor.gaggiuino_barista_graph_2
    card:
      type: vertical-stack
      cards:
        - type: markdown
          content: >-
            ${(() => {
              const shots = states['sensor.gaggiuino_barista_shot_history'].attributes.shots;
              if (!shots || shots.length < 2) return '';
              const s = shots[1];
              return '**' + s.datetime.substring(0,10) + ' ' + s.datetime.substring(11,16) + ' — ' + s.profile + '** &nbsp; ⏱ ' + s.duration_s + 's &nbsp; ⚖️ ' + s.final_weight_g + 'g &nbsp; 📈 ' + s.max_pressure_bar + 'bar';
            })()}
          card_mod:
            style: |
              ha-card { border-radius: 0; margin-bottom: -2px; text-align: center; padding: 8px; }
        - type: picture
          image: ${states['sensor.gaggiuino_barista_graph_2'].state}
          card_mod:
            style: |
              ha-card { border-radius: 0 0 12px 12px; }

