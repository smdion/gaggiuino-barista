name: Gaggiuino Barista
slug: gaggiuino_barista
version: "1.1.0"
description: Automatically detects shots, generates detailed graphs, runs a deterministic telemetry analyzer plus AI phrasing, and sends mobile push notifications with annotated graphs and next-shot tuning recommendations.
url: https://github.com/nikosiaf/gaggiuino-barista
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
host_network: true

ports:
  5000/tcp: 5000

hassio_api: true
hassio_role: default
homeassistant_api: true

options:
  api_base: "http://gaggiuino.local"
  anthropic_api_key: ""
  gemini_api_key: ""
  ha_notify_service: "notify.mobile_app_your_phone"

schema:
  api_base: str
  anthropic_api_key: str
  gemini_api_key: str
  ha_notify_service: str

map:
  - type: addon_config
    read_only: false
  - type: homeassistant_config
    read_only: false
    path: /homeassistant